<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Your custom styles -->
  <link rel="stylesheet" href="reset-password.css">
</head>
<body>

  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card glassmorphism p-4 text-center">
      <h2 class="mb-4">🔑 Reset Your Password</h2>

      <div class="mb-3">
        <input id="newPassword" type="password" class="form-control" placeholder="New Password" />
      </div>

      <div class="mb-3">
        <input id="confirmPassword" type="password" class="form-control" placeholder="Confirm Password" />
      </div>

      <button class="btn btn-dark w-100 mb-3" onclick="submitReset()">Change Password</button>

      <div id="message" class="fw-bold"></div>
    </div>
  </div>

  <!-- Bootstrap Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    async function submitReset() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get("token");
      console.log(urlParams);
      console.log(token);
      const newPassword = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const message = document.getElementById("message");

      if (newPassword !== confirmPassword) {
        message.textContent = "❌ Passwords do not match.";
        message.classList.add("text-danger");
        message.classList.remove("text-success");
        return;
      }

      // Debug output
      console.log("Reset Token:", token);
      console.log("New Password:", newPassword);

      message.textContent = "✅ Passwords match!";
      message.classList.add("text-success");
      message.classList.remove("text-danger");
    }
  </script>
</body>
</html>
